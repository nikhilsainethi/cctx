name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }}, ${{ matrix.variant }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: core
            features: ""
            suffix: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: full
            features: "proxy,embeddings"
            suffix: "-full"

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            variant: core
            features: ""
            suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            variant: full
            features: "proxy,embeddings"
            suffix: "-full"

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            variant: core
            features: ""
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            variant: full
            features: "proxy,embeddings"
            suffix: "-full"

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: core
            features: ""
            suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            variant: full
            features: "proxy,embeddings"
            suffix: "-full"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features && format('--features "{0}"', matrix.features) || '' }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cctx${{ matrix.suffix }}-${{ matrix.target }}.tar.gz cctx
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../cctx${{ matrix.suffix }}-${{ matrix.target }}.zip cctx.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cctx${{ matrix.suffix }}-${{ matrix.target }}
          path: cctx${{ matrix.suffix }}-${{ matrix.target }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
