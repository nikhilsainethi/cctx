name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (core)
        run: cargo clippy -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --features "proxy,embeddings,llm" -- -D warnings

      - name: Test (core)
        run: cargo test

      - name: Test (proxy)
        run: cargo test --features proxy

      - name: Test (embeddings)
        run: cargo test --features embeddings

      - name: Test (llm)
        run: cargo test --features llm

      - name: Build release (core)
        run: cargo build --release

      - name: Build release (full)
        run: cargo build --release --features "proxy,embeddings,llm"
